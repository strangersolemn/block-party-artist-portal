<!DOCTYPE html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Mock Child</title><style>html,body{margin:0;height:100%;background:#000;font-family:"Courier New",monospace;color:#fff;overflow:hidden}#wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:20px;text-align:center}#shape{width:min(40vmin,260px);height:min(40vmin,260px);border-radius:50%;border:3px solid rgba(255,255,255,0.25);box-shadow:0 0 60px currentColor;animation:pulse 2.4s ease-in-out infinite alternate}@keyframes pulse{from{transform:scale(.95)}to{transform:scale(1.05)}}h1{font-size:14px;letter-spacing:3px;margin:0;opacity:.75}p{font-size:10px;letter-spacing:1px;opacity:.5;margin:0;word-break:break-all;max-width:80vw}</style></head><body><div id=wrap><div id=shape></div><h1>MOCK CHILD</h1><p id=meta>loading…</p></div><script>
// Self-rendering mock child inscription. Each delegate is its own copy of
// this file; its colour is derived from its inscription ID (extracted from
// the URL path when served at /content/{id}). Tiny on-chain footprint.
(function(){
  var path = location.pathname;
  var m = path.match(/\/content\/([a-f0-9]+i\d+)/i);
  var id = m ? m[1] : "local-preview-" + Math.random().toString(16).slice(2, 10);
  // Hash → 0..360 hue
  var h = 0; for (var i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) & 0xffff;
  var hue = h % 360;
  var color = "hsl(" + hue + ",70%,55%)";
  var shape = document.getElementById("shape");
  shape.style.background = color;
  shape.style.color = color;
  document.getElementById("meta").textContent = id.slice(0, 8) + "…" + id.slice(-8) + " · hue " + hue;
})();
</script></body></html>
