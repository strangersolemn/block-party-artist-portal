<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Acid Frogs — Hybrid · Real Frogs</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,"SF Pro Display","Helvetica Neue",sans-serif;-webkit-font-smoothing:antialiased}
  :root {
    --bg: #0a0814;
    --bg-2: #14102a;
    --acid: #71ff5e;
    --neon-pink: #ff2d8d;
    --neon-cyan: #2df0ff;
    --neon-yellow: #fff42d;
    --line: rgba(255,255,255,0.08);
    --line-bright: rgba(255,255,255,0.15);
    --ink: #fff;
    --ink-soft: rgba(255,255,255,0.55);
  }
  body{
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(255,45,141,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 100% 100%, rgba(45,240,255,0.15) 0%, transparent 50%),
      linear-gradient(90deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.04) 50%, transparent 50%, transparent 100%),
      linear-gradient(90deg, transparent 0%, transparent 25%, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.04) 75%, transparent 75%, transparent 100%),
      repeating-linear-gradient(0deg, transparent 0px, transparent 38px, rgba(255,255,255,0.03) 38px, rgba(255,255,255,0.03) 40px),
      repeating-linear-gradient(90deg, transparent 0px, transparent 78px, rgba(255,255,255,0.04) 78px, rgba(255,255,255,0.04) 80px);
    background-size:auto, auto, 160px 80px, 160px 80px, auto, auto;
  }
  .wrap{max-width:1100px;margin:0 auto;padding:32px 24px}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:36px}
  .logo{font-size:26px;font-weight:800;letter-spacing:-1px;color:var(--ink)}
  .logo .x{display:inline-block;color:var(--neon-pink);text-shadow:0 0 12px var(--neon-pink)}
  .connect{
    background:linear-gradient(135deg,var(--neon-pink),var(--neon-cyan));
    color:#000;border:none;padding:11px 22px;border-radius:100px;
    font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.3px;
    box-shadow:0 4px 20px rgba(255,45,141,0.4)
  }
  .tag-strip{
    text-align:center;font-size:11px;letter-spacing:4px;
    color:var(--ink-soft);margin-bottom:32px;text-transform:uppercase
  }
  .layout{display:grid;grid-template-columns:1fr 320px;gap:28px;align-items:start}

  .stage{
    background:rgba(20,16,42,0.6);
    border-radius:24px;padding:32px;
    border:1px solid var(--line);backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    position:relative;overflow:hidden;
  }
  .stage::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(circle at 12px 12px, rgba(255,255,255,0.03) 4px, transparent 5px);
    background-size:24px 24px;opacity:.6;
  }
  .stage > *{position:relative;z-index:1}
  .stage-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .stage-title{font-size:11px;letter-spacing:3px;color:var(--ink-soft);text-transform:uppercase;font-weight:600}
  .bpm-pill{font-size:11px;color:var(--acid);background:rgba(113,255,94,0.1);padding:4px 12px;border-radius:100px;letter-spacing:1px;font-weight:600;text-transform:uppercase}

  /* SLOTS contain rendered canvases */
  .slots{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
  .slot{
    aspect-ratio:1/1;border-radius:18px;overflow:hidden;position:relative;transition:all .2s
  }
  .slot.empty{
    border:2px dashed var(--line-bright);background:rgba(0,0,0,0.25);
    display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:11px;letter-spacing:2px;text-transform:uppercase
  }
  .slot.empty:hover{border-color:var(--acid);background:rgba(113,255,94,0.05)}
  .slot.filled{
    box-shadow:inset 0 -8px 0 rgba(0,0,0,0.18),inset 0 2px 0 rgba(255,255,255,0.18),0 6px 20px rgba(0,0,0,0.45);
  }
  .slot.filled canvas{width:100%;height:100%;display:block;background:#000}
  .slot.filled .bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .slot.filled canvas{position:relative;z-index:1;background:transparent}
  .slot.filled::after{
    content:"";position:absolute;top:0;left:0;right:0;height:12px;z-index:2;
    background-image:radial-gradient(circle at 16px 8px, rgba(255,255,255,0.25) 5px, transparent 6px);
    background-size:32px 12px;
    pointer-events:none
  }
  .slot.filled .badge{
    position:absolute;top:18px;right:14px;z-index:3;
    background:rgba(0,0,0,0.4);color:#fff;font-size:10px;font-weight:600;
    padding:4px 10px;border-radius:100px;letter-spacing:0.5px;backdrop-filter:blur(4px)
  }

  .transport{display:flex;gap:12px;margin-bottom:24px}
  .play-btn{
    flex:1;background:linear-gradient(135deg,var(--neon-pink),#ff5a9e);
    color:#fff;border:none;padding:18px;border-radius:18px;
    font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;
    box-shadow:0 6px 24px rgba(255,45,141,0.5);transition:all .15s
  }
  .play-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,45,141,0.7)}
  .icon-btn{
    width:54px;height:54px;border-radius:18px;
    background:rgba(255,255,255,0.06);border:1px solid var(--line-bright);color:var(--ink);
    cursor:pointer;font-size:14px;font-weight:700;letter-spacing:0.5px;
    display:flex;align-items:center;justify-content:center
  }
  .icon-btn.rec{color:#ff4060;border-color:#ff4060}
  .knobs{
    display:grid;grid-template-columns:repeat(4,1fr);gap:18px;
    padding-top:24px;border-top:1px solid var(--line)
  }
  .knob{display:flex;flex-direction:column;gap:8px}
  .knob-label{font-size:10px;letter-spacing:2px;color:var(--ink-soft);text-transform:uppercase;font-weight:600}
  .knob-slider{position:relative;height:6px;background:rgba(255,255,255,0.08);border-radius:100px;cursor:pointer}
  .knob-slider::before{content:"";position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--neon-cyan),var(--neon-pink));border-radius:100px;width:60%}
  .knob:nth-child(2) .knob-slider::before{width:25%}
  .knob:nth-child(3) .knob-slider::before{width:10%}
  .knob:nth-child(4) .knob-slider::before{width:40%}
  .knob-slider::after{content:"";position:absolute;top:-5px;left:60%;width:16px;height:16px;background:#fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4),0 0 8px var(--neon-cyan);transform:translateX(-50%)}
  .knob:nth-child(2) .knob-slider::after{left:25%}
  .knob:nth-child(3) .knob-slider::after{left:10%}
  .knob:nth-child(4) .knob-slider::after{left:40%}
  .knob-val{font-size:11px;color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}

  .inventory{
    background:rgba(20,16,42,0.6);
    border-radius:24px;padding:22px;
    border:1px solid var(--line);backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }
  .inv-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .inv-title{font-size:11px;letter-spacing:3px;color:var(--ink-soft);text-transform:uppercase;font-weight:600}
  .inv-count{font-size:11px;color:var(--acid);background:rgba(113,255,94,0.1);padding:3px 10px;border-radius:100px;letter-spacing:0.5px;font-weight:600}
  .inv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .inv-frog{
    aspect-ratio:1/1;border-radius:14px;overflow:hidden;position:relative;
    box-shadow:inset 0 -4px 0 rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.18);
    cursor:grab;
    transition:all .15s
  }
  .inv-frog::after{
    content:"";position:absolute;top:0;left:0;right:0;height:8px;z-index:2;
    background-image:radial-gradient(circle at 10px 5px, rgba(255,255,255,0.25) 3px, transparent 4px);
    background-size:20px 8px;
    pointer-events:none
  }
  .inv-frog:hover{transform:translateY(-2px);box-shadow:inset 0 -4px 0 rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.18),0 6px 16px rgba(0,0,0,0.35)}
  .inv-frog .bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .inv-frog canvas{width:100%;height:100%;display:block;position:relative;z-index:1;background:transparent}

  .footer-tag{
    text-align:center;margin-top:48px;font-size:10px;
    color:var(--ink-soft);letter-spacing:3px;text-transform:uppercase
  }
  @media (max-width:780px){
    .layout{grid-template-columns:1fr}
    .inventory{order:2}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">acid<span class="x">·</span>frogs</div>
    <button class="connect">Connect Wallet</button>
  </div>

  <div class="tag-strip">YOUR FROGS · YOUR TRACK · STACK · PLAY</div>

  <div class="layout">
    <div class="stage">
      <div class="stage-head">
        <div class="stage-title">Stage</div>
        <div class="bpm-pill">123 BPM</div>
      </div>

      <div class="slots" id="slots">
        <!-- 4 slots filled by JS -->
      </div>

      <div class="transport">
        <button class="icon-btn rec">REC</button>
        <button class="play-btn">▶ PLAY</button>
        <button class="icon-btn">↗</button>
      </div>

      <div class="knobs">
        <div class="knob"><span class="knob-label">Cutoff</span><div class="knob-slider"></div><span class="knob-val">60</span></div>
        <div class="knob"><span class="knob-label">Reverb</span><div class="knob-slider"></div><span class="knob-val">25</span></div>
        <div class="knob"><span class="knob-label">Delay</span><div class="knob-slider"></div><span class="knob-val">10</span></div>
        <div class="knob"><span class="knob-label">Drive</span><div class="knob-slider"></div><span class="knob-val">40</span></div>
      </div>
    </div>

    <div class="inventory">
      <div class="inv-head">
        <div class="inv-title">Your Frogs</div>
        <div class="inv-count" id="inv-count">12</div>
      </div>
      <div class="inv-grid" id="inv-grid">
        <!-- inventory bricks filled by JS -->
      </div>
    </div>
  </div>

  <div class="footer-tag">style 05 · hybrid · real frogs</div>
</div>

<script>
// ==============================================================
//   Audio + composition logic — adapted from main preview
// ==============================================================

const TONE_URL  = "https://ordinals.com/content/04813d7748d918bd8a3069cb1823ebc9586f0ce16cd6a97a784581ec38d13062i0";
const KICK_URL  = "https://ordinals.com/content/73f8110caa1f84e0ea79fc654d43cdc7f6f2be88110938997f0d1351146a1f52i0";
const CLAP_URL  = "https://ordinals.com/content/edb9b5d508556b2b104d390c9c712a712d4643156c669ba73393597ce2e76ae2i0";
const HAT_URL   = "https://ordinals.com/content/83407a1c9637e53e76e3d4de711b971f557e7876ad96b9b520a8202109521ba1i0";
const FINAL_URL = "https://ordinals.com/content/cfe7e84e28512591c0057ccc41ee2269a8cce4b3561e4d7e1b884b31daadf9c2i0";

const BASS_LOW  = ["c2","b1","bb1","a1","ab1","g1","gb1","f1","eb1","d1","db1","c1","e1","ab2","a2","bb2"];
const BASS_MID  = ["c3","eb3","f3","g3","bb3","ab3","db3","d3"];
const BASS_HIGH = ["eb4","g4","f4","c4","bb3","ab4","d4","db4"];

function generateBasslineFromBlock(merkleHex) {
  const m = (merkleHex || "").replace(/^0x/, "").padEnd(32, "0");
  const out = [];
  for (let i = 0; i < 16; i++) {
    const byte = parseInt(m.substr(i * 2, 2), 16);
    const rB = byte >> 4, nB = byte & 0x0F;
    let slot;
    if      (rB < 5)  slot = "rest";
    else if (rB < 8)  slot = "ghost";
    else if (rB < 13) slot = "low";
    else if (rB < 15) slot = "mid";
    else              slot = "high";
    if (slot === "rest") { out.push({ note: null, play: true }); continue; }
    const pool = slot === "high" ? BASS_HIGH : slot === "mid" ? BASS_MID : BASS_LOW;
    out.push({ note: pool[nB % pool.length], play: slot !== "ghost" });
  }
  return out;
}

const traitFolders = {
  body:     { count: 1,  color: true  },
  eyes:     { count: 27, color: true  },
  mouth:    { count: 2,  color: false },
  head:     { count: 48, color: false },
  clothing: { count: 21, color: false },
  smoke:    { count: 2,  color: false },
};
const colorWeights256 = [
  { name:"Green",  filter:"none",                                  w:179 },
  { name:"Blue",   filter:"hue-rotate(92deg) saturate(166%)",      w:26  },
  { name:"Red",    filter:"hue-rotate(239deg) saturate(200%)",     w:20  },
  { name:"Pink",   filter:"hue-rotate(197deg) saturate(200%)",     w:18  },
  { name:"Purple", filter:"hue-rotate(158deg) saturate(198%)",     w:13  },
];

function spritePath(kind, slot) {
  let p;
  switch (kind) {
    case "body":  p = "../Body_sprites/1body-sprite.avif"; break;
    case "mouth": p = `../Mouth_sprites/${slot}Mouth-sprite.avif`; break;
    case "eyes":  p = `../Eyes_sprites/${slot}eyes new.avif`; break;
    case "clothing":
      p = `../Clothing_sprites/${slot}${slot >= 19 ? "Brand" : "brand"} new clothing.avif`; break;
    case "head":
      p = slot <= 45 ? `../Head_sprites/brandnewhead${slot}.avif` : `../Head_sprites/${slot}Brandnewhead.avif`;
      break;
    case "smoke": p = `../smoke_sprites/${slot}smoke.avif`; break;
  }
  return p.split("/").map(encodeURIComponent).join("/").replace(/%2E%2E/g, "..");
}
function bgPath(slot) { return `../BG/${slot}BG.${slot <= 5 ? "JPG" : "jpg"}`; }

function pickWeighted(table, byteVal) {
  let cum = 0;
  for (const t of table) { cum += t.w; if (byteVal < cum) return t; }
  return table[table.length - 1];
}
function pickTraits(merkle) {
  const m = merkle.replace(/^0x/, "");
  const b = (i) => parseInt(m.substr(i*2, 2), 16);
  return {
    color:    pickWeighted(colorWeights256, b(0)),
    head:     { slot: (b(1) % traitFolders.head.count) + 1 },
    eyes:     { slot: (b(2) % traitFolders.eyes.count) + 1 },
    clothing: { slot: (b(3) % traitFolders.clothing.count) + 1 },
    mouth:    { slot: (b(4) % traitFolders.mouth.count) + 1 },
    smoke:    { slot: b(5) < 200 ? 0 : (b(5) % traitFolders.smoke.count) + 1 },
    bg:       { slot: (b(6) % 8) + 1 },
    body:     { slot: 1 },
  };
}

function loadImg(url) {
  return new Promise((res) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = () => res(null);
    img.src = url;
  });
}
async function loadFrogSprites(traits) {
  const out = {};
  out.body     = await loadImg(spritePath("body", 1));
  out.mouth    = await loadImg(spritePath("mouth", traits.mouth.slot));
  out.eyes     = await loadImg(spritePath("eyes", traits.eyes.slot));
  out.clothing = await loadImg(spritePath("clothing", traits.clothing.slot));
  out.head     = await loadImg(spritePath("head", traits.head.slot));
  out.smoke    = traits.smoke.slot > 0 ? await loadImg(spritePath("smoke", traits.smoke.slot)) : null;
  return out;
}

function drawFrame(ctx, sprites, traits, frameIndex) {
  const W = 500, H = 500;
  ctx.clearRect(0, 0, W, H);
  const frameX = frameIndex * W;
  const drawLayer = (img, applyColorFilter) => {
    if (!img) return;
    if (applyColorFilter && traits.color.filter !== "none") {
      const tmp = document.createElement("canvas");
      tmp.width = W; tmp.height = H;
      const tctx = tmp.getContext("2d");
      tctx.drawImage(img, frameX, 0, W, H, 0, 0, W, H);
      tctx.filter = traits.color.filter;
      tctx.globalCompositeOperation = "source-atop";
      tctx.drawImage(tmp, 0, 0);
      ctx.drawImage(tmp, 0, 0);
    } else {
      ctx.drawImage(img, frameX, 0, W, H, 0, 0, W, H);
    }
  };
  drawLayer(sprites.body, true);
  drawLayer(sprites.mouth, false);
  drawLayer(sprites.eyes, true);
  drawLayer(sprites.clothing, false);
  drawLayer(sprites.head, false);
  if (sprites.smoke && traits.smoke.slot > 0) drawLayer(sprites.smoke, false);
}

async function fetchBlock(height) {
  try {
    const res = await fetch("https://ordinals.com/r/blockinfo/" + height);
    return await res.json();
  } catch { return null; }
}

// Render a single frog into a brick (canvas + bg image + badge).
// If isInStage, also stash the merkleroot + bassline + canvas onto the container
// so the audio engine can drive its dance + bass.
async function renderFrogBrick(container, height, idNumber, isInStage) {
  const block = await fetchBlock(height);
  if (!block) return;
  const merkle = (block.merkle_root || block.merkleroot || "").replace(/^0x/, "");
  const traits = pickTraits(merkle);
  const sprites = await loadFrogSprites(traits);

  const bgImg = document.createElement("img");
  bgImg.className = "bg-img";
  bgImg.src = bgPath(traits.bg.slot);
  container.appendChild(bgImg);

  const cv = document.createElement("canvas");
  cv.width = 500; cv.height = 500;
  container.appendChild(cv);
  const ctx = cv.getContext("2d");
  drawFrame(ctx, sprites, traits, 0);

  if (isInStage && idNumber) {
    const badge = document.createElement("span");
    badge.className = "badge";
    badge.textContent = "#" + idNumber;
    container.appendChild(badge);

    container._frog = {
      merkle, traits, sprites, ctx, height,
      bassline: generateBasslineFromBlock(merkle),
      nonceHex: Number(block.nonce).toString(16).padStart(8, "0"),
    };
  }
}

// Pick 16 evenly-spaced blocks across the 1337 epoch for variety
function pickBlocks(count) {
  const start = 941472, end = 943487;
  const step = Math.floor((end - start) / count);
  const out = [];
  for (let i = 0; i < count; i++) out.push(start + i * step);
  return out;
}

// ----- Build the stage (4 slots, 1 empty for variety) -----
const stageEl = document.getElementById("slots");
const stageBlocks = pickBlocks(4);
const stagePattern = [true, false, true, true]; // 3 filled, 1 empty
stagePattern.forEach((isFilled, i) => {
  const slot = document.createElement("div");
  slot.className = "slot " + (isFilled ? "filled" : "empty");
  if (!isFilled) {
    slot.innerHTML = "drop frog";
  }
  stageEl.appendChild(slot);
  if (isFilled) {
    const id = 287 + i * 451; // pretend id numbers
    renderFrogBrick(slot, stageBlocks[i], id, true);
  }
});

// ----- Build inventory (12 unique frogs) -----
const invEl = document.getElementById("inv-grid");
const invBlocks = pickBlocks(12);
invBlocks.forEach((h) => {
  const cell = document.createElement("div");
  cell.className = "inv-frog";
  invEl.appendChild(cell);
  renderFrogBrick(cell, h, null, false);
});

// ==============================================================
//   AUDIO ENGINE — 4-slot polyphonic, master FX, drum kit shared
// ==============================================================

const playBtn = document.querySelector(".play-btn");
const recBtn  = document.querySelector(".icon-btn.rec");
let audioState = {
  started: false,
  toneLoaded: false,
  recording: false,
  stepIdx: 0,
  frameIdx: 0,
  stepsSinceHat: 999,
  stepTimer: null,
  // Master FX nodes
  masterDelay: null, masterReverb: null, masterDist: null,
  // Per-slot synth chains
  slotSynths: [],   // [{ synth, filter, ref (slot DOM) }, ...]
  // Drums
  kickP: null, clapP: null, hatP: null, finalP: null,
  // Recording
  mediaRecorder: null, recordedChunks: [],
};

async function loadToneJS() {
  if (audioState.toneLoaded) return;
  await new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = TONE_URL; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  audioState.toneLoaded = true;
}

function getStageFrogs() {
  return Array.from(document.querySelectorAll(".slot.filled"))
    .filter(s => s._frog)
    .map(s => ({ slot: s, frog: s._frog }));
}

async function startAudio() {
  if (audioState.started) return;
  audioState.started = true;
  playBtn.textContent = "■ STOP";

  await loadToneJS();
  await Tone.start();
  Tone.Transport.bpm.value = 123;

  // Master FX chain (shared)
  audioState.masterDist   = new Tone.Distortion(getKnobVal("Drive") / 100).toDestination();
  audioState.masterReverb = new Tone.Reverb({ decay: 3, wet: getKnobVal("Reverb") / 100 });
  await audioState.masterReverb.generate();
  audioState.masterReverb.connect(audioState.masterDist);
  audioState.masterDelay  = new Tone.FeedbackDelay({ delayTime: "8n", feedback: 0.5, wet: getKnobVal("Delay") / 100 });
  audioState.masterDelay.connect(audioState.masterReverb);

  // Drum players (also via master FX)
  audioState.kickP  = new Tone.Player({ url: KICK_URL,  volume: -4 });  audioState.kickP.connect(audioState.masterDist);
  audioState.clapP  = new Tone.Player({ url: CLAP_URL,  volume: -6 });  audioState.clapP.connect(audioState.masterDist);
  audioState.hatP   = new Tone.Player({ url: HAT_URL,   volume: -14 }); audioState.hatP.connect(audioState.masterDist);
  audioState.finalP = new Tone.Player({ url: FINAL_URL, volume: 4 });   audioState.finalP.connect(audioState.masterDist);

  // Per-slot synth + filter
  const stage = getStageFrogs();
  audioState.slotSynths = stage.map(({ slot, frog }) => {
    const filter = new Tone.Filter({
      frequency: 400 + (parseInt(frog.nonceHex[1], 16) * 150),
      type: "lowpass", Q: 4
    });
    filter.connect(audioState.masterDelay);
    const synth = new Tone.MonoSynth({
      oscillator: { type: "sawtooth" },
      envelope:       { attack: 0.005, decay: 0.2, sustain: 0.1, release: 0.2 },
      filterEnvelope: { attack: 0.005, decay: 0.3, sustain: 0.2, release: 0.3, baseFrequency: 200, octaves: 3 },
    });
    synth.connect(filter);
    synth.volume.value = -12; // 4 voices summed -> a bit quieter each
    return { synth, filter, slot, frog };
  });

  // Apply current cutoff knob immediately
  applyKnobsToFX();

  await Tone.loaded();

  const STEP_MS = (60 / 123 / 4) * 1000;
  audioState.stepIdx = 0;
  audioState.stepTimer = setInterval(() => audioStep(), STEP_MS);
}

function audioStep() {
  const stepIn16 = audioState.stepIdx % 16;
  const barCount = Math.floor(audioState.stepIdx / 16) % 8;

  // Hat-driven dance frame for ALL filled stage frogs
  const isHatStep = stepIn16 % 4 === 2;
  if (isHatStep) audioState.stepsSinceHat = 0;
  else audioState.stepsSinceHat++;
  if (audioState.stepsSinceHat === 0)      audioState.frameIdx = 1;
  else if (audioState.stepsSinceHat === 1) audioState.frameIdx = 2;
  else                                     audioState.frameIdx = 0;

  // Re-draw each filled stage frog at the current dance frame
  for (const { slot, frog } of audioState.slotSynths) {
    if (frog && frog.ctx) drawFrame(frog.ctx, frog.sprites, frog.traits, audioState.frameIdx);
  }

  // ---- Kick ----
  if (barCount < 4) {
    if (stepIn16 % 4 === 0) audioState.kickP.start();
  } else if (barCount === 4 && stepIn16 === 0) {
    audioState.kickP.start();
  }
  if (barCount === 0 && stepIn16 === 2) audioState.kickP.start();

  // ---- Clap ----
  if (barCount === 7 && stepIn16 >= 12) audioState.clapP.start();
  else if (stepIn16 === 4 || stepIn16 === 12) audioState.clapP.start();

  // ---- Hat ----
  if (stepIn16 % 4 === 2 && !(barCount === 7 && stepIn16 >= 12)) audioState.hatP.start();

  // ---- Final ACID hit ----
  if (barCount === 7 && stepIn16 === 12) audioState.finalP.start();

  // ---- Bass per slot ----
  const bassAllowed = !(barCount === 7 && stepIn16 >= 9);
  for (const { synth, frog } of audioState.slotSynths) {
    if (!bassAllowed) continue;
    const step = frog.bassline[stepIn16];
    if (step.note) {
      const velocity = step.play ? 0.85 : 0.45;
      synth.triggerAttackRelease(step.note, "16n", Tone.now(), velocity);
    }
  }

  audioState.stepIdx++;
}

function stopAudio() {
  if (audioState.stepTimer) { clearInterval(audioState.stepTimer); audioState.stepTimer = null; }
  audioState.started = false;
  audioState.frameIdx = 0;
  audioState.stepsSinceHat = 999;
  // Reset dance frame
  for (const { slot, frog } of audioState.slotSynths) {
    if (frog && frog.ctx) drawFrame(frog.ctx, frog.sprites, frog.traits, 0);
  }
  playBtn.textContent = "▶ PLAY";
}

playBtn.addEventListener("click", () => audioState.started ? stopAudio() : startAudio());

// ---- Knob handlers (cutoff/reverb/delay/drive) ----
function getKnobByLabel(label) {
  return Array.from(document.querySelectorAll(".knob")).find(k => k.querySelector(".knob-label").textContent === label);
}
function getKnobVal(label) {
  const k = getKnobByLabel(label);
  if (!k) return 0;
  // Read percentage from the slider's pseudo-element width — but we don't have that.
  // Use stored data attribute (initialised below).
  return Number(k.dataset.val ?? 0);
}
function setKnobVal(label, v, max = 100) {
  const k = getKnobByLabel(label);
  if (!k) return;
  k.dataset.val = v;
  const slider = k.querySelector(".knob-slider");
  slider.style.setProperty("--pct", (v / max * 100) + "%");
  k.querySelector(".knob-val").textContent = v;
  applyKnobsToFX();
}
function applyKnobsToFX() {
  if (!audioState.started) return;
  const cutoff = getKnobVal("Cutoff");
  // Map cutoff 0-100 to 200-4000 Hz
  const freq = 200 + (cutoff / 100) * 3800;
  for (const { filter } of audioState.slotSynths) {
    filter.frequency.setValueAtTime(freq, Tone.now());
  }
  if (audioState.masterDelay)  audioState.masterDelay.wet.value  = getKnobVal("Delay")  / 100;
  if (audioState.masterReverb) audioState.masterReverb.wet.value = getKnobVal("Reverb") / 100;
  if (audioState.masterDist)   audioState.masterDist.distortion  = getKnobVal("Drive")  / 100;
}

// Hook up sliders. Initial values read from the existing CSS percentages.
const knobInits = { Cutoff: 60, Reverb: 25, Delay: 10, Drive: 40 };
for (const [label, val] of Object.entries(knobInits)) {
  const k = getKnobByLabel(label);
  if (!k) continue;
  k.dataset.val = val;
  const slider = k.querySelector(".knob-slider");
  slider.style.cursor = "pointer";
  // Click anywhere on the slider sets the value proportional to where clicked
  slider.addEventListener("click", (e) => {
    const rect = slider.getBoundingClientRect();
    const pct = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
    setKnobVal(label, Math.round(pct));
  });
  let dragging = false;
  slider.addEventListener("mousedown", () => dragging = true);
  window.addEventListener("mouseup", () => dragging = false);
  window.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const rect = slider.getBoundingClientRect();
    const pct = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
    setKnobVal(label, Math.round(pct));
  });
}

// Override the static CSS gradient widths with dynamic ones
const styleHook = document.createElement("style");
styleHook.textContent = `
  .knob-slider::before { width: var(--pct, 50%) !important; }
  .knob-slider::after  { left: var(--pct, 50%) !important; }
`;
document.head.appendChild(styleHook);

// ---- Recording ----
recBtn.addEventListener("click", async () => {
  if (!audioState.started) {
    alert("Press PLAY first, then REC to capture audio.");
    return;
  }
  if (audioState.recording) {
    audioState.mediaRecorder.stop();
    audioState.recording = false;
    recBtn.style.background = "";
    recBtn.style.color = "#ff4060";
  } else {
    const dest = Tone.context.rawContext.createMediaStreamDestination();
    Tone.Destination.connect(dest);
    audioState.recordedChunks = [];
    audioState.mediaRecorder = new MediaRecorder(dest.stream);
    audioState.mediaRecorder.ondataavailable = (e) => audioState.recordedChunks.push(e.data);
    audioState.mediaRecorder.onstop = () => {
      const blob = new Blob(audioState.recordedChunks, { type: "audio/webm" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `acid-frogs-${Date.now()}.webm`;
      a.click();
    };
    audioState.mediaRecorder.start();
    audioState.recording = true;
    recBtn.style.background = "#ff4060";
    recBtn.style.color = "#fff";
  }
});
</script>
</body>
