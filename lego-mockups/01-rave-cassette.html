<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Acid Frogs — Lego Mockup 01 · Rave Cassette</title>
<style>
  :root {
    --bg: #0c0a18;
    --pink: #ff2d8d;
    --cyan: #2df0ff;
    --yellow: #fff42d;
    --green: #71ff5e;
    --grey: #2a2640;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:"Helvetica Neue",-apple-system,sans-serif}
  body{background:var(--bg);color:#fff;min-height:100vh;
       background-image:radial-gradient(circle at 20% 80%,rgba(255,45,141,0.15) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(45,240,255,0.15) 0%,transparent 50%)}
  .wrap{max-width:1100px;margin:0 auto;padding:24px}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
  .logo{font-size:32px;font-weight:900;letter-spacing:-1px}
  .logo span{color:var(--pink)}
  .connect{background:var(--pink);color:#fff;border:none;padding:12px 20px;border-radius:100px;font-weight:700;cursor:pointer;font-size:13px;letter-spacing:0.5px}
  .connect:hover{background:var(--cyan);color:#000}
  .layout{display:grid;grid-template-columns:280px 1fr;gap:24px}
  .inventory{background:rgba(20,18,40,0.7);border-radius:24px;padding:18px;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08)}
  .inv-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;opacity:.6;margin-bottom:14px}
  .inv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .inv-frog{aspect-ratio:1/1;background:linear-gradient(135deg,var(--green),#357c2e);border-radius:14px;cursor:grab;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid transparent;transition:all .15s}
  .inv-frog:hover{transform:translateY(-2px);border-color:var(--yellow)}
  .inv-frog:nth-child(2n){background:linear-gradient(135deg,#5e8ff7,#2348a8)}
  .inv-frog:nth-child(3n){background:linear-gradient(135deg,#ff5b6e,#9c1f2c)}
  .inv-frog:nth-child(5n){background:linear-gradient(135deg,#c47bff,#5d2c8f)}
  .stage{background:linear-gradient(135deg,rgba(40,30,80,0.6),rgba(20,15,50,0.6));border-radius:24px;padding:24px;border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(10px)}
  .slots{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
  .slot{aspect-ratio:1/1;border-radius:18px;border:2px dashed rgba(255,255,255,0.15);background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s}
  .slot.filled{border-style:solid;border-color:var(--cyan);background:linear-gradient(135deg,var(--green),#357c2e)}
  .slot.filled::after{content:"";position:absolute;top:6px;right:6px;width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .slot .empty{font-size:11px;opacity:.4;text-transform:uppercase;letter-spacing:2px}
  .transport{display:flex;justify-content:center;align-items:center;gap:18px;margin:24px 0}
  .play-btn{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#ff5fb0);border:none;cursor:pointer;color:#fff;font-size:30px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(255,45,141,0.5)}
  .play-btn:hover{transform:scale(1.05)}
  .small-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:10px 16px;border-radius:100px;font-size:12px;cursor:pointer;font-weight:600;letter-spacing:0.5px}
  .small-btn:hover{background:rgba(255,255,255,0.15)}
  .small-btn.rec{background:transparent;border-color:var(--pink);color:var(--pink)}
  .small-btn.rec.active{background:var(--pink);color:#fff;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .knobs{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.08)}
  .knob{display:flex;flex-direction:column;align-items:center;gap:6px}
  .knob-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;opacity:.7}
  .knob-dial{width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#3a3060,#1a1530);border:2px solid rgba(255,255,255,0.1);position:relative;cursor:pointer}
  .knob-dial::after{content:"";position:absolute;top:6px;left:50%;width:2px;height:18px;background:var(--cyan);box-shadow:0 0 6px var(--cyan);transform-origin:50% 200%;transform:translateX(-50%) rotate(35deg)}
  .knob-val{font-size:10px;opacity:.6;font-variant-numeric:tabular-nums}
  .footer-tag{text-align:center;margin-top:24px;font-size:10px;opacity:.4;letter-spacing:2px;text-transform:uppercase}
  @media (max-width:760px){.layout{grid-template-columns:1fr}.inventory{order:2}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">acid<span>·</span>frogs</div>
    <button class="connect">Connect Wallet</button>
  </div>

  <div class="layout">
    <div class="inventory">
      <div class="inv-title">Your Frogs · 12</div>
      <div class="inv-grid">
        <div class="inv-frog">🐸</div>
        <div class="inv-frog">🐸</div>
        <div class="inv-frog">🐸</div>
        <div class="inv-frog">🐸</div>
        <div class="inv-frog">🐸</div>
        <div class="inv-frog">🐸</div>
        <div class="inv-frog">🐸</div>
        <div class="inv-frog">🐸</div>
        <div class="inv-frog">🐸</div>
      </div>
    </div>

    <div class="stage">
      <div class="slots">
        <div class="slot filled">🐸</div>
        <div class="slot"><span class="empty">drop frog</span></div>
        <div class="slot"><span class="empty">drop frog</span></div>
        <div class="slot filled">🐸</div>
      </div>

      <div class="transport">
        <button class="small-btn rec">● REC</button>
        <button class="play-btn">▶</button>
        <button class="small-btn">SHARE</button>
      </div>

      <div class="knobs">
        <div class="knob"><span class="knob-label">cutoff</span><div class="knob-dial"></div><span class="knob-val">68</span></div>
        <div class="knob"><span class="knob-label">reverb</span><div class="knob-dial"></div><span class="knob-val">22</span></div>
        <div class="knob"><span class="knob-label">delay</span><div class="knob-dial"></div><span class="knob-val">14</span></div>
        <div class="knob"><span class="knob-label">drive</span><div class="knob-dial"></div><span class="knob-val">40</span></div>
      </div>
    </div>
  </div>

  <div class="footer-tag">style 01 · rave cassette</div>
</div>
</body>
</html>
