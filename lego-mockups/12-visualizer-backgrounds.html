<!DOCTYPE html>

<head>

<title>Acid Frogs · Visualizer Backgrounds</title>

<style>

    --acid: #9f9;
    --acidglow: rgba(153,255,153,0.4);

    --pink: #ff88ff;
    --cyan: #88ffff;

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--acid);font-family:var(--mono);min-height:100vh}
  .wrap{max-width:1100px;margin:0 auto;padding:24px 16px 80px}

  .sub{font-size:12px;opacity:.7;margin-bottom:16px;letter-spacing:2px}

<script>
// ==============================================================
//   Acid Frogs Preview — uses repo-local AVIF sprites + real 1337-epoch block data
// ==============================================================

const EPOCH_START = 941472;
const EPOCH_END = 943487;

const traitFolders = {
  body:     { count: 1,  color: true  },
  mouth:    { count: 2,  color: false },
  eyes:     { count: 27, color: true  },
  clothing: { count: 21, color: false },
  head:     { count: 48, color: false },
  smoke:    { count: 2,  color: false },
};

// Real filename patterns discovered in the repo — URL-encode to handle spaces.
function spritePath(kind, slot) {
  let path;
  switch (kind) {
    case "body":  path = "Body_sprites/1body-sprite.avif"; break;
    case "mouth": path = `Mouth_sprites/${slot}Mouth-sprite.avif`; break;
    case "eyes":  path = `Eyes_sprites/${slot}eyes new.avif`; break;
    case "clothing": {
      const prefix = slot >= 19 ? "Brand" : "brand";
      path = `Clothing_sprites/${slot}${prefix} new clothing.avif`;
      break;
    }
    case "head":
      path = slot <= 45
        ? `Head_sprites/brandnewhead${slot}.avif`
        : `Head_sprites/${slot}Brandnewhead.avif`;
      break;
    case "smoke": path = `smoke_sprites/${slot}smoke.avif`; break;
  }
  // Encode each path segment (preserves slashes, escapes spaces etc)
  // Prepend ../ because this mockup lives in /lego-mockups/ subfolder
  return "../" + path.split("/").map(encodeURIComponent).join("/");
}

const colorVariants = [
  { name: "Green",  filter: "none",                                  weight: 70, tier: "common" },
  { name: "Blue",   filter: "hue-rotate(92deg) saturate(166%)",      weight: 10, tier: "uncommon" },
  { name: "Red",    filter: "hue-rotate(239deg) saturate(200%)",     weight: 8,  tier: "uncommon" },
  { name: "Pink",   filter: "hue-rotate(197deg) saturate(200%)",     weight: 7,  tier: "rare" },
  { name: "Purple", filter: "hue-rotate(158deg) saturate(198%)",     weight: 5,  tier: "legendary" },
];

// Weight 70+10+8+7+5 = 100. Scale to 256 for clean merkleroot-byte mapping:
// Green 179 / Blue 26 / Red 20 / Pink 18 / Purple 13 = 256
const colorWeights256 = [
  { ...colorVariants[0], w: 179 },
  { ...colorVariants[1], w: 26 },
  { ...colorVariants[2], w: 20 },
  { ...colorVariants[3], w: 18 },
  { ...colorVariants[4], w: 13 },
];

// Note pools — all dark minor territory (C / Eb phrygian feel)
const BASS_LOW  = ["c2","b1","bb1","a1","ab1","g1","gb1","f1","eb1","d1","db1","c1","e1","ab2","a2","bb2"];
const BASS_MID  = ["c3","eb3","f3","g3","bb3","ab3","db3","d3"];
const BASS_HIGH = ["eb4","g4","f4","c4","bb3","ab4","d4","db4"];

// Generate a PER-BLOCK bassline. RHYTHM and NOTES are both derived from merkleroot.
// One byte of merkleroot per step. The byte determines:
//   - high nibble (4 bits) → rhythm state: rest / ghost / low / mid / high / accent
//   - low nibble  (4 bits) → note index within that state's pool
//
// Result: every frog has a fundamentally different pattern structure.
// Distribution (from 16 possible rhythm values):
//   5/16 rest     (~31%)   silence
//   3/16 ghost    (~19%)   lowered-velocity low note
//   5/16 low      (~31%)   normal low bass note
//   2/16 mid      (~12%)   mid stab
//   1/16 high     (~6%)    high acid stab
function generateBasslineFromBlock(merkleHex) {
  const m = (merkleHex || "").replace(/^0x/, "").padEnd(32, "0");
  const out = [];
  for (let i = 0; i < 16; i++) {
    const byte = parseInt(m.substr(i * 2, 2), 16);
    const rhythmBits = byte >> 4;    // 0..15
    const noteBits   = byte & 0x0F;  // 0..15

    let slot;
    if      (rhythmBits < 5)  slot = "rest";   // 0-4
    else if (rhythmBits < 8)  slot = "ghost";  // 5-7
    else if (rhythmBits < 13) slot = "low";    // 8-12
    else if (rhythmBits < 15) slot = "mid";    // 13-14
    else                      slot = "high";   // 15

    if (slot === "rest") {
      out.push({ note: null, play: true });
      continue;
    }
    const pool =
      slot === "high" ? BASS_HIGH :
      slot === "mid"  ? BASS_MID  :
      BASS_LOW; // low + ghost share the low pool
    const note = pool[noteBits % pool.length];
    out.push({ note, play: slot !== "ghost" });
  }
  return out;
}

// Preview/demo pattern — "Sinister Walk" from strangersolemn's 50-pattern library.
// Shown before any block is loaded. Every real block generates its own pattern.
const PREVIEW_PATTERN = [
  { note: 'c2',  play: true  }, { note: null,  play: true  },
  { note: 'b1',  play: false }, { note: 'bb1', play: true  },
  { note: null,  play: false }, { note: 'eb4', play: true  },
  { note: 'a1',  play: true  }, { note: null,  play: true  },
  { note: 'ab1', play: false }, { note: null,  play: false },
  { note: 'g1',  play: true  }, { note: 'c3',  play: true  },
  { note: null,  play: true  }, { note: 'gb1', play: false },
  { note: null,  play: false }, { note: null,  play: false },
];
// Generate a 16-step SLIDE MASK (which bass steps glide from the previous
// note). Derived from merkleroot bytes 16-23 — sparse, txid-unique per frog.
// Roughly 1-3 slides per 16 steps, never two in a row (so the glide always
// has a fresh target note to lock onto).
function generateSlideMask(merkleHex) {
  const m = (merkleHex || "").replace(/^0x/, "").padEnd(64, "0");
  const mask = new Array(16).fill(false);
  // 8 bytes = 8 candidate slide positions (every other step)
  for (let i = 0; i < 8; i++) {
    const byte = parseInt(m.substr(32 + i * 2, 2), 16);
    // ~25% probability per candidate → ~2 slides per 16 steps on average
    if ((byte & 0x0F) >= 12) {
      const stepPos = i * 2 + 1;        // odd steps only — feels syncopated
      // Avoid back-to-back slides
      if (!mask[stepPos - 1] && !mask[stepPos + 1]) mask[stepPos] = true;
    }
  }
  return mask;
}

// Drop a note one octave (for underground variation). Returns null if can't drop further.
function lowerOctave(noteStr) {
  if (!noteStr) return null;
  const m = noteStr.match(/^([a-g][b#]?)(\d+)$/i);
  if (!m) return noteStr;
  const oct = parseInt(m[2], 10);
  if (oct <= 0) return noteStr;
  return m[1] + (oct - 1);
}

// ---- Chromatic note <-> MIDI helpers (used by generateBasslineV2) ----
// 12 notes per octave: c c# d d# e f f# g g# a a# b. Shifting "down one space"
// in this table = down 1 semitone.
const NOTE_SEMITONES = {
  c:0, "c#":1, db:1, d:2, "d#":3, eb:3, e:4, f:5, "f#":6, gb:6,
  g:7, "g#":8, ab:8, a:9, "a#":10, bb:10, b:11
};
const NOTE_NAMES = ["c","c#","d","d#","e","f","f#","g","g#","a","a#","b"];
function noteToMidi(noteStr) {
  if (!noteStr) return null;
  const m = noteStr.match(/^([a-g][b#]?)(\d+)$/i);
  if (!m) return null;
  const sem = NOTE_SEMITONES[m[1].toLowerCase()];
  if (sem === undefined) return null;
  return (parseInt(m[2], 10) + 1) * 12 + sem;
}
function midiToNote(midi) {
  if (midi == null || midi < 0) return null;
  const oct = Math.floor(midi / 12) - 1;
  return NOTE_NAMES[((midi % 12) + 12) % 12] + oct;
}
function shiftSemitone(noteStr, delta) {
  const midi = noteToMidi(noteStr);
  if (midi === null) return noteStr;
  return midiToNote(midi + delta) || noteStr;
}

// ---- Second-riff bassline variation ----
// Each frog plays TWO 8-bar riffs in sequence. Riff 1 = the original
// bassline. Riff 2 = the same pattern with two small mutations:
//   1. ONE rest step gets filled with a new low note.
//   2. ONE existing note is shifted DOWN by 1 semitone (one space in the
//      12-note chromatic scale).
// Both choices are derived from merkleroot bytes 24..27 so the second
// riff is unique-but-deterministic per frog.
function generateBasslineV2(original, merkleHex) {
  const m = (merkleHex || "").replace(/^0x/, "").padEnd(64, "0");
  const v2 = original.map(s => ({ ...s }));

  // 1) Fill one rest step with a low note (txid-derived which rest + which note).
  const restSteps = [];
  for (let i = 0; i < v2.length; i++) if (v2[i].note === null) restSteps.push(i);
  if (restSteps.length > 0) {
    const addStep = restSteps[parseInt(m.substr(48, 2), 16) % restSteps.length];
    const noteIdx = parseInt(m.substr(50, 2), 16) % BASS_LOW.length;
    v2[addStep] = { note: BASS_LOW[noteIdx], play: true };
  }

  // 2) Shift one existing note down 1 semitone (txid-derived which note).
  const noteSteps = [];
  for (let i = 0; i < v2.length; i++) if (v2[i].note !== null) noteSteps.push(i);
  if (noteSteps.length > 0) {
    const shiftStep = noteSteps[parseInt(m.substr(52, 2), 16) % noteSteps.length];
    v2[shiftStep] = { ...v2[shiftStep], note: shiftSemitone(v2[shiftStep].note, -1) };
  }

  return v2;
}

const TONE_URL  = "https://ordinals.com/content/04813d7748d918bd8a3069cb1823ebc9586f0ce16cd6a97a784581ec38d13062i0";
const KICK_URL  = "https://ordinals.com/content/73f8110caa1f84e0ea79fc654d43cdc7f6f2be88110938997f0d1351146a1f52i0";
const CLAP_URL  = "https://ordinals.com/content/edb9b5d508556b2b104d390c9c712a712d4643156c669ba73393597ce2e76ae2i0";
const HAT_URL   = "https://ordinals.com/content/83407a1c9637e53e76e3d4de711b971f557e7876ad96b9b520a8202109521ba1i0";
const FINAL_URL = "https://ordinals.com/content/cfe7e84e28512591c0057ccc41ee2269a8cce4b3561e4d7e1b884b31daadf9c2i0";

// Extra percussion samples (can be swapped via drum-kit toggle)
const HAT_DIF_URL   = "https://ordinals.com/content/544460a9c39fbe6307c3bf3c88eb43eb4711f21266c32308d5ee14182d9fabeai0";
const SNARE_DIF_URL = "https://ordinals.com/content/c0da354edd8cace5b39e8e4a711d61cc9caee1de9a950f76e062b1330c25211ai0";
const TAMB_URL      = "https://ordinals.com/content/8b5cf2d44507fc0ac9020373b51b3c0a1382ee3c8b1e1ec835253ded99543b9ci0";
const WOOD_URL      = "https://ordinals.com/content/75a4d1f19f98433fac91c5b048c139ae8309b385fb5346167ab1eb1aa8a55540i0";
const SHAKER1_URL   = "https://ordinals.com/content/809f6e1f0d9ece8c63af98b644c8c0767608b8de8dca4174d0057d134e861529i0";
const SHAKER2_URL   = "https://ordinals.com/content/ccaa4e6f8f862fffa9a20adc446f2e0c12bb091c40bb0fee7740fc0ba30a40cei0";

// 16 ACID vocal samples — one fires at the drop (bar 8 step 12), txid-derived choice.
const VOCAL_BASE = "0a79cf2b3f6742e020fbc758f08306685b6b4c483b3ba15ecc6e1ff0bcdccb24";
const VOCAL_URLS = Array.from({length:16}, (_,i) => `https://ordinals.com/content/${VOCAL_BASE}i${i}`);

// Drum kit presets — switchable live. Each is a complete locked beat.
// Audio chain (the BEAUTIFUL one) stays exactly the same; only sample selection varies.
// kick: "std"      = four-on-the-floor (tech house). Every quarter note.
//       "halftime" = kick every 2 beats (the 1 and the 3 → steps 0 and 8). Sparser.
const DRUM_KITS = [
  { id:"P01", label:"01 · Tech-house",    kick:"std",      hat:"std", layers:[] },
  { id:"P02", label:"02 · Half-time",     kick:"halftime", hat:"std", layers:[] },
  { id:"P03", label:"03 · Shaker drive",  kick:"std",      hat:"std", layers:["SHAKER1"] },
  { id:"P04", label:"04 · Minimal",       kick:"std",      hat:null,  layers:[] },
  { id:"P05", label:"05 · Industrial",    kick:"std",      hat:"std", layers:["WOOD","TAMB"] },
  { id:"P06", label:"06 · Dif hat",       kick:"std",      hat:"dif", layers:[] },
  { id:"P07", label:"07 · Snare layer",   kick:"std",      hat:"std", layers:["SNARE_DIF"] },
  { id:"P08", label:"08 · Full kit",      kick:"std",      hat:"dif", layers:["SHAKER2","TAMB","SNARE_DIF","WOOD"] },
];
let currentKit = DRUM_KITS[0];

// -------------------------- pure helpers --------------------------
function pickWeighted(table, byteVal) {
  let cum = 0;
  for (const t of table) {
    cum += t.w;
    if (byteVal < cum) return t;
  }
  return table[table.length - 1];
}
function pickByMod(table, byteVal) {
  return table[byteVal % table.length];
}
// Returns the 16-step bass pattern for a given bar, with 2-bar variations.
// "Underground dark" rule: every 2 bars, drop one note an octave lower.
// Which step is picked varies from the block nonce.
function patternForBarDeep(basePattern, barCount, nonceHex) {
  const p = basePattern.map(x => ({...x}));
  const stepA = parseInt(nonceHex[2], 16) % 16;  // variation swap step #1
  const stepB = parseInt(nonceHex[3], 16) % 16;  // variation swap step #2
  const pairIdx = Math.floor(barCount / 2);      // 0..3 across the 8-bar loop

  if (pairIdx % 2 === 1 && p[stepA].note) {
    p[stepA] = { ...p[stepA], note: lowerOctave(p[stepA].note) };
  }
  if (pairIdx >= 2 && pairIdx % 2 === 0 && p[stepB].note && stepB !== stepA) {
    p[stepB] = { ...p[stepB], note: lowerOctave(p[stepB].note) };
  }
  return p;
}
function loadImg(url) {
  return new Promise((res) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = (e) => {
      console.warn("[acid-frogs] failed to load image:", url);
      res(null);
    };
    img.src = url;
  });
}
async function fetchBlock(height) {
  const res = await fetch("https://ordinals.com/r/blockinfo/" + height);
  return res.json();
}

// -------------------------- trait assignment --------------------------
function pickTraits(merkleHex) {
  const m = merkleHex.replace(/^0x/, "");
  const b = (i) => parseInt(m.substr(i * 2, 2), 16);
  const colorPick = pickWeighted(colorWeights256, b(0));
  return {
    color:    colorPick,
    head:     { slot: (b(1) % traitFolders.head.count) + 1 },
    eyes:     { slot: (b(2) % traitFolders.eyes.count) + 1 },
    clothing: { slot: (b(3) % traitFolders.clothing.count) + 1 },
    mouth:    { slot: (b(4) % traitFolders.mouth.count) + 1 },
    smoke:    { slot: b(5) < 200 ? 0 : (b(5) % traitFolders.smoke.count) + 1 }, // most frogs no smoke
    bg:       { slot: (b(6) % 8) + 1 }, // 8 BG variants
    body:     { slot: 1 }, // only one body
  };
}

function bgPath(slot) {
  return `../BG/${slot}BG.${slot <= 5 ? "JPG" : "jpg"}`;
}

// -------------------------- canvas compositor --------------------------
function drawFrame(ctx, sprites, traits, frameIndex) {
  const W = 500, H = 500;
  ctx.clearRect(0, 0, W, H);
  const frameX = frameIndex * W; // each sprite is 1500x500 = 3 frames
  const drawLayer = (img, applyColorFilter) => {
    if (!img) return;
    if (applyColorFilter && traits.color.filter !== "none") {
      const tmp = document.createElement("canvas");
      tmp.width = W; tmp.height = H;
      const tctx = tmp.getContext("2d");
      tctx.drawImage(img, frameX, 0, W, H, 0, 0, W, H);
      tctx.filter = traits.color.filter;
      tctx.globalCompositeOperation = "source-atop";
      tctx.drawImage(tmp, 0, 0);
      ctx.drawImage(tmp, 0, 0);
    } else {
      ctx.drawImage(img, frameX, 0, W, H, 0, 0, W, H);
    }
  };
  drawLayer(sprites.body,     true);
  drawLayer(sprites.mouth,    false);
  drawLayer(sprites.eyes,     true);
  drawLayer(sprites.clothing, false);
  drawLayer(sprites.head,     false);
  if (sprites.smoke && traits.smoke.slot > 0) drawLayer(sprites.smoke, false);
}

async function loadFrogSprites(traits) {
  const out = {};
  const paths = {
    body:     spritePath("body",     traits.body.slot),
    mouth:    spritePath("mouth",    traits.mouth.slot),
    eyes:     spritePath("eyes",     traits.eyes.slot),
    clothing: spritePath("clothing", traits.clothing.slot),
    head:     spritePath("head",     traits.head.slot),
  };
  for (const [k, p] of Object.entries(paths)) {
    out[k] = await loadImg(p);
  }
  out.smoke = traits.smoke.slot > 0 ? await loadImg(spritePath("smoke", traits.smoke.slot)) : null;
  const loaded = Object.values(out).filter(Boolean).length;
  const total = Object.keys(out).length - (traits.smoke.slot === 0 ? 1 : 0);
  console.log(`[acid-frogs] loaded ${loaded}/${total} sprites`, paths);
  out._debug = { loaded, total };
  return out;
}

// Two PARALLEL bass chains — same MonoSynth, fed into two independent
// filter+drive paths, summed back together. AUTO chain runs the baked-in
// arrangement (LFO speed variation + drive arc). USER chain is fully
// manual — knobs set its values directly, no auto-sweep on this path.
// Two distinct squelches layered on the same bassline.
let userCutoff = 1000;    // user-chain filter cutoff (Hz)
let userReso   = 5;       // user-chain filter Q
let userDrive  = 0.15;    // user-chain distortion amount (0..1)

// LFO phase accumulators — speed varies per bar so the squelch feels alive.
// Phase is integrated continuously so changing speed never causes clicks.
let cutoffLfoPhase = 0;
let resoLfoPhase   = 0;
const CUTOFF_LFO_SPEEDS = [0.08, 0.12, 0.20, 0.28, 0.45, 0.55, 0.18, 0.10]; // slow→fast→slow
const RESO_LFO_SPEEDS   = [0.06, 0.30, 0.10, 0.42, 0.18, 0.25, 0.50, 0.12]; // independent jitter

// Auto-chain CUTOFF + RESO arcs as 9 keyframes (start of each bar + end of bar 7).
// Real up-down movement, not monotonic ramps. Tuned to push acid character —
// reso climbs to 13 by bar 6 (peak squelch), dips for the lull, jumps back for drop.
const CUTOFF_ARC = [400, 1100,  700, 2200, 1500, 3300, 1800, 2400, 4500]; // Hz per bar boundary
const RESO_ARC   = [3,    6,    4,    9,    5,   11,    7,    9,   13];   // Q  per bar boundary
function lerpArc(arc, barCount, stepIn16) {
  const a = arc[barCount];
  const b = arc[Math.min(arc.length - 1, barCount + 1)];
  const t = stepIn16 / 16;
  return a + (b - a) * t;
}

// Bass variation — subtle change every 2 bars for underground/dark feel.
// On odd pairs (bars 3-4, 7-8, 11-12, 15-16): force one step to lowest octave root.
// On later pairs (4+): also modify a second step. Minimal — just 1-2 notes.
function patternForBar(basePattern, barCount, nonceHex) {
  const p = basePattern.slice();
  const stepA = parseInt(nonceHex[2], 16) % 16;  // dark-swap step #1
  const stepB = parseInt(nonceHex[3], 16) % 16;  // dark-swap step #2
  const pairIdx = Math.floor(barCount / 2);      // 0..7 across the 16-bar loop

  // Every other pair: drop stepA to root (value 1 = lowest playable, darker)
  if (pairIdx % 2 === 1 && p[stepA] > 0) {
    p[stepA] = 1;
  }
  // From pair 4 onwards, alternate in stepB on the even pairs too
  if (pairIdx >= 4 && pairIdx % 2 === 0 && p[stepB] > 0 && stepB !== stepA) {
    p[stepB] = 1;
  }
  return p;
}

// ============================================================================
// VISUALIZER BACKGROUNDS — 10 audio-reactive canvases, all kick-punctuated
// ============================================================================
// Audio data is read off `masterAnalyser` (a Tone.Analyser fed by the master
// limiter output, init'd in startAudio()). When audio isn't playing yet, the
// visualizers idle on a slow generative animation so the picker is still fun.
// `kickFlash` (already used elsewhere) is set to 1 on every kick hit and decays
// via animate() — visualizers read it for the per-kick punch.

const bgCanvas = document.getElementById("bgCanvas");
const bgCtx    = bgCanvas.getContext("2d");
let masterAnalyser = null;       // Tone.Analyser (FFT 64) — created in startAudio
let visState = {};                // per-visualizer scratch state (particles etc.)
let currentVis = "spectrum";      // which visualizer is rendering
let visStartTime = performance.now();

// Curated to user's 5 keepers. Drove by multiple flash signals (kick/clap/hat/
// acid) so visualizers stay alive even when the kick drops out in bars 6-8.
const VISUALIZERS = [

// Skipping pearl (too close to white, washes out) and hematite (too close to
// the bg). Order chosen so adjacent channels feel distinct.

// Per-channel intensity (decays each frame, spiked by audio events)

function getFFT() {
  if (!masterAnalyser) return null;
  try { return masterAnalyser.getValue(); } catch (e) { return null; }
}

function drawVisualizer() {
  if (!bgCtx) return;
  const W = bgCanvas.width, H = bgCanvas.height;
  const t = (performance.now() - visStartTime) / 1000;     // seconds since switch
  const fft = getFFT();                                     // -100..0 dB array, 64 bins, or null
  switch (currentVis) {
    case "spectrum":  return drawSpectrum(W, H, t, fft);
    case "electric":  return drawElectric(W, H, t, fft);
    case "strobe":    return drawStrobe(W, H, t, fft);
    case "blockdata": return drawBlockdata(W, H, t, fft);
    case "undertone": return drawUndertone(W, H, t, fft);
  }
}

// Helper: take the raw FFT (dB) and turn into a 0..1 magnitude array.
function fftMag(fft) {
  if (!fft) return null;
  const out = new Array(fft.length);
  for (let i = 0; i < fft.length; i++) {
    const db = fft[i];
    out[i] = Math.max(0, (db + 100) / 100);   // -100..0 dB → 0..1
  }
  return out;
}

// ============================================================================
// VISUALIZER KEEPERS (5)
// Each visualizer can read multiple flash signals so it stays alive even
// when the kick drops out (bars 6-8 of the arrangement). Signals:
//   kickFlash  — 4-on-floor kick / halftime kick / dnb kick
//   clapFlash  — clap on 2 and 4, plus the bar-8 outro claps
//   hatFlash   — hi-hat off-beats (4 per bar, very steady)
//   acidFlash  — bar-8 ACID hit (longer decay, "rings" out)
// All decay independently in the animate() RAF tick.
// ============================================================================

// ----------- 01 · Spectrum bars (mirrored, full width) -----------
// Reflects the FFT around the centre line so the bars fill the WHOLE width
// instead of bunching on the left. Drives accent layers from kick (low band),
// clap (mid band), hat (high band), so something is always moving.
function drawSpectrum(W, H, t, fft) {
  bgCtx.fillStyle = "rgba(0,0,0,0.5)";
  bgCtx.fillRect(0, 0, W, H);
  const mag = fftMag(fft);
  const N = 24;                    // 24 bars per side -> 48 total mirrored
  const bw = W / (N * 2);
  for (let i = 0; i < N; i++) {
    // Mix the FFT bin with one of the flash signals based on band:
    // - low bins (kick range) lift on kickFlash
    // - mid bins (clap snare) lift on clapFlash
    // - high bins lift on hatFlash
    const fftV = mag ? mag[Math.min(i * 2, mag.length - 1)] : 0;
    const idle = 0.05 + 0.05 * Math.sin(t * 2 + i * 0.3);
    let punch = 0;
    if (i < 6)        punch = kickFlash * 0.45;
    else if (i < 14)  punch = clapFlash * 0.5;
    else              punch = hatFlash  * 0.4;
    const m = Math.max(idle, fftV) + punch;
    const h = Math.min(1, m) * H * 0.85;
    // Hue cycles green -> cyan -> green across the bar count
    const hue = 110 + Math.sin(i * 0.5) * 30;
    bgCtx.fillStyle = `hsl(${hue}, 80%, ${50 + Math.min(m, 1) * 25}%)`;
    // Right side
    const xR = W / 2 + i * bw;
    bgCtx.fillRect(xR + 1, H - h, bw - 2, h);
    // Mirrored left side
    const xL = W / 2 - (i + 1) * bw;
    bgCtx.fillRect(xL + 1, H - h, bw - 2, h);
  }
  // ACID hit = full-bg gold flash (rare, big)
  if (acidFlash > 0.05) {
    bgCtx.fillStyle = `rgba(255,215,0,${acidFlash * 0.45})`;
    bgCtx.fillRect(0, 0, W, H);
  }
}

// ----------- 02 · Electric line -----------
// A flowing horizontal sine wave across the full width. Steady, hat-driven
// so it always has motion (hat fires every other beat). Clap punches it
// upward; kick adds a slow envelope swell; ACID sends a flash spike.
let _electricPhase = 0;
function drawElectric(W, H, t, fft) {
  bgCtx.fillStyle = "rgba(0,0,0,0.35)";
  bgCtx.fillRect(0, 0, W, H);
  _electricPhase += 0.06 + hatFlash * 0.08;
  const cy = H * 0.5;
  const baseAmp = H * 0.15;
  const swell   = baseAmp * (1 + kickFlash * 0.35);
  const punch   = clapFlash * H * 0.18;

  // Glow underneath (wide, low-alpha line)
  bgCtx.strokeStyle = `rgba(153,255,153,${0.18 + hatFlash * 0.18})`;
  bgCtx.lineWidth = 16 + acidFlash * 18;
  bgCtx.beginPath();
  for (let x = 0; x <= W; x += 4) {
    const px = x / W;
    const y = cy + Math.sin(px * 8 - _electricPhase) * swell
               + Math.sin(px * 22 - _electricPhase * 2.3) * punch * 0.5;
    if (x === 0) bgCtx.moveTo(x, y); else bgCtx.lineTo(x, y);
  }
  bgCtx.stroke();
  // Crisp top line
  bgCtx.strokeStyle = `rgba(153,255,153,${0.85 + acidFlash * 0.15})`;
  bgCtx.lineWidth = 2 + clapFlash * 2;
  bgCtx.beginPath();
  for (let x = 0; x <= W; x += 4) {
    const px = x / W;
    const y = cy + Math.sin(px * 8 - _electricPhase) * swell
               + Math.sin(px * 22 - _electricPhase * 2.3) * punch * 0.5;
    if (x === 0) bgCtx.moveTo(x, y); else bgCtx.lineTo(x, y);
  }
  bgCtx.stroke();
}

// ----------- 03 · Strobe -----------
// Idle state SITS ON THE COLOUR (Jade — the classic frog green) instead of
// near-black. When nothing's flashing the bg is a steady saturated colour
// that breathes slightly with t. Flashes punch BRIGHTER (white-ish) on top:
//   clap  -> bright pale green flash (carries through bars 6-8)
//   kick  -> deep darker pulse for contrast
//   ACID  -> gold over the top
// Future work: in production, default colour will follow the active frog's
// body gem (Jade/Ruby/Amethyst etc) instead of being hardcoded.
function drawStrobe(W, H, t, fft) {
  // Idle base: Jade with a gentle breathing modulation so it never feels static
  const breathe = 1 + Math.sin(t * 1.2) * 0.06;
  bgCtx.fillStyle = `rgb(${Math.round(46 * breathe)}, ${Math.round(82 * breathe)}, ${Math.round(48 * breathe)})`;
  bgCtx.fillRect(0, 0, W, H);
  // Clap = bright pale-green pulse (lifts the whole field)
  if (clapFlash > 0.05) {
    bgCtx.fillStyle = `rgba(180,255,180,${clapFlash * 0.85})`;
    bgCtx.fillRect(0, 0, W, H);
  }
  // Kick = deep darker punch for rhythmic contrast against the bright base
  if (kickFlash > 0.05) {
    bgCtx.fillStyle = `rgba(0,30,0,${kickFlash * 0.45})`;
    bgCtx.fillRect(0, 0, W, H);
  }
  // ACID hit = gold flash on top
  if (acidFlash > 0.05) {
    bgCtx.fillStyle = `rgba(238,210,72,${acidFlash * 0.7})`;  // Topaz
    bgCtx.fillRect(0, 0, W, H);
  }
  // Subtle scanlines
  bgCtx.strokeStyle = "rgba(0,0,0,0.18)";
  bgCtx.lineWidth = 1;
  for (let y = 0; y < H; y += 4) {
    bgCtx.beginPath();
    bgCtx.moveTo(0, y); bgCtx.lineTo(W, y);
    bgCtx.stroke();
  }
}

// ----------- 04 · Block-data scroll (full width) -----------
// Two columns of scrolling block hex, filling the entire canvas width.
// Each row spans the whole canvas. Kick punches the brightness; clap fires
// a row-jitter; ACID = gold pulse on the nonce header.
let _blockOff = 0;
function drawBlockdata(W, H, t, fft) {
  bgCtx.fillStyle = "rgba(0,0,0,0.6)";
  bgCtx.fillRect(0, 0, W, H);
  const merkle = (current && current.merkle) || "0".repeat(64);
  const nonce  = (current && current.nonceHex) || "00000000";
  bgCtx.font = "12px monospace";
  bgCtx.textBaseline = "top";
  const lineH = 14;
  _blockOff += 0.6 + clapFlash * 0.8;       // clap punches the scroll speed
  // Build a long line: merkleroot looped enough times to fill any width
  const bigLine = (merkle + " · ").repeat(8);
  const lines = Math.ceil(H / lineH) + 4;
  for (let i = 0; i < lines; i++) {
    const y = (i * lineH - (_blockOff % lineH));
    // Slight per-row offset of the long line so it doesn't repeat identically
    const offsetChars = (i * 13 + Math.floor(_blockOff / lineH)) % 64;
    const slice = bigLine.slice(offsetChars, offsetChars + Math.ceil(W / 7) + 8);
    // Brightness ramps to centre + spikes on kick
    const dim = 0.18 + (1 - Math.abs(i - lines / 2) / (lines / 2)) * 0.5;
    bgCtx.fillStyle = `rgba(153,255,153,${dim + kickFlash * 0.35})`;
    bgCtx.fillText(slice, 6, y);
  }
  // Nonce header at top, ACID-pulsed
  bgCtx.fillStyle = `rgba(255,215,0,${0.6 + acidFlash * 0.4})`;
  const headerText = "NONCE 0x" + nonce + "   ·   KICK " + (kickFlash > 0.4 ? "▮" : " ") +
                     "   CLAP " + (clapFlash > 0.4 ? "▮" : " ") +
                     "   HAT " + (hatFlash > 0.4 ? "▮" : " ");
  bgCtx.fillRect(0, 0, W, 18);
  bgCtx.fillStyle = "#000";
  bgCtx.fillRect(0, 0, W, 18);
  bgCtx.fillStyle = `rgba(255,215,0,${0.7 + acidFlash * 0.3})`;
  bgCtx.fillText(headerText, 8, 3);
}

// ----------- 05 · Acid Undertone (Acid Frogs palette) -----------
// Concentric expanding squares from centre, 6 channels. Replaces Renascent
// #13's pink/blue/dark-blue with the 6 frog body colours (green, pink,
// blue, yellow, red, gray). Channels 0-3 driven by individual sounds so
// each event spawns its own coloured wave.
function drawUndertone(W, H, t, fft) {
  bgCtx.fillStyle = "#19181d";
  bgCtx.fillRect(0, 0, W, H);

  // Trigger channels by sound:
  // ch[0] green   = kick
  // ch[1] pink    = clap
  // ch[2] blue    = hat
  // ch[3] yellow  = ACID
  // ch[4] red     = clap second voice (offset)
  // ch[5] gray    = hat second voice (offset)
  if (kickFlash > 0.85) undertoneCh[0] = 1;
  if (clapFlash > 0.85) { undertoneCh[1] = 1; undertoneCh[4] = 0.6; }
  if (hatFlash  > 0.85) { undertoneCh[2] = 1; undertoneCh[5] = 0.4; }
  if (acidFlash > 0.85) undertoneCh[3] = 1;

  undertoneFlow += 1.5;
  const cX = W / 2, cY = H / 2;
  const mx = Math.max(W, H) * 1.6;

  for (let i = 0; i < undertoneCh.length; i++) {
    const ch = undertoneCh[i];
    const colour = UNDERTONE_PALETTE[i];
    const fl = (i / undertoneCh.length) * mx + undertoneFlow;
    const ct = 4;
    for (let k = 0; k < ct; k++) {
      const s = (fl + k * 30) % mx;
      if (s < 10) continue;
      bgCtx.save();
      bgCtx.beginPath();
      bgCtx.strokeStyle = colour;
      bgCtx.lineWidth = 1 + ch * 4;
      bgCtx.globalAlpha = 0.4 + ch * 0.55;
      bgCtx.strokeRect(cX - s / 2, cY - s / 2, s, s);
      bgCtx.restore();
    }
    undertoneCh[i] *= 0.88;
  }

  // CRT scanlines
  bgCtx.save();
  bgCtx.strokeStyle = "rgba(0,0,0,0.85)";
  bgCtx.lineWidth = 1;
  for (let y = 0; y < H; y += 4) {
    bgCtx.beginPath();
    bgCtx.moveTo(0, y); bgCtx.lineTo(W, y);
    bgCtx.stroke();
  }
  bgCtx.restore();
}

// Frog animation is DRIVEN BY THE AUDIO SEQUENCER — frameIdx advances inside the
// 16th-note step timer (only when audio is playing). When audio is stopped, frog
// stays on frame 0. See stepTimer callback below.

// Drive helpers — each chain (auto + user) has its own makeup gain so that
// when distortion goes up, the chain's level drops inversely. With both
// chains summing to ~unity, perceived loudness stays flat regardless of drive.
function makeupFor(driveAmount) {
  const a = Math.max(0, Math.min(1, driveAmount));
  // Halved compared to single-chain version because two parallel paths sum:
  // baseline of 0.5 per chain × ~unity perceived loudness compensation.
  return 0.5 / (1 + a * 1.5);
}
function setAutoDrive(amount, time) {
  const a = Math.max(0, Math.min(1, amount));
  const t = time !== undefined ? time : (Tone.now ? Tone.now() : 0);
  if (distAuto)   distAuto.distortion = a;
  if (makeupAuto) makeupAuto.gain.setValueAtTime(makeupFor(a), t);
}
function setUserChain(cutoff, reso, drive, time) {
  userCutoff = cutoff; userReso = reso; userDrive = drive;
  const t = time !== undefined ? time : (Tone.now ? Tone.now() : 0);
  if (filterUser) {
    filterUser.frequency.setValueAtTime(cutoff, t);
    filterUser.Q.setValueAtTime(reso, t);
  }
  if (distUser)   distUser.distortion = drive;
  if (makeupUser) makeupUser.gain.setValueAtTime(makeupFor(drive), t);
}

// ---- FX knob wiring ----
// Cutoff/reso/drive knobs control the USER chain DIRECTLY. The auto chain
// keeps running its baked-in squelch arrangement in parallel underneath.
function wireFXKnobs() {
  const bindings = [
    ["fx-cutoff", (v) => setUserChain(Number(v), userReso, userDrive)],
    ["fx-reso",   (v) => setUserChain(userCutoff, Number(v), userDrive)],
    ["fx-delay",  (v) => { if (delayFX) delayFX.wet.value = Number(v) / 100; }],
    ["fx-reverb", (v) => { if (reverbFX) reverbFX.wet.value = Number(v) / 100; }],
    ["fx-drive",  (v) => setUserChain(userCutoff, userReso, Number(v) / 100)],
  ];
  for (const [id, fn] of bindings) {
    const el = document.getElementById(id);
    if (!el) continue;
    const labelEl = document.getElementById(id + "-val");
    if (el._acidWired) continue;
    el._acidWired = true;
    el.addEventListener("input", () => {
      fn(el.value);
      if (labelEl) labelEl.textContent = el.value;
    });
  }
}
function applyFXFromKnobs() {
  const getVal = (id, def) => {
    const el = document.getElementById(id);
    return el ? Number(el.value) : def;
  };
  setUserChain(
    getVal("fx-cutoff", 1000),
    getVal("fx-reso", 5),
    getVal("fx-drive", 15) / 100
  );
  if (delayFX) { delayFX.wet.value = getVal("fx-delay", 0) / 100; }
  if (reverbFX){ reverbFX.wet.value = getVal("fx-reverb", 0) / 100; }
}

async function startAudio() {
  if (!current) return;
  if (audioStarted) return;
  audioStarted = true;
  playBtn.textContent = "■ STOP";

  if (!toneLoaded) {
    await new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = TONE_URL; s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
    toneLoaded = true;
  }
  await Tone.start();
  Tone.Transport.bpm.value = 123;

  kickP  = new Tone.Player({ url: KICK_URL,  volume: -4  }).toDestination();
  clapP  = new Tone.Player({ url: CLAP_URL,  volume: -6  }).toDestination();
  hatP   = new Tone.Player({ url: HAT_URL,   volume: -14 }).toDestination();
  finalP = new Tone.Player({ url: FINAL_URL, volume: 4   }).toDestination(); // +6dB from prior -2dB = ~doubled

  // Extra percussion players for kit toggling
  hatDifP   = new Tone.Player({ url: HAT_DIF_URL,   volume: -14 }).toDestination();
  snareDifP = new Tone.Player({ url: SNARE_DIF_URL, volume: -8  }).toDestination();
  tambP     = new Tone.Player({ url: TAMB_URL,      volume: -16 }).toDestination();
  woodP     = new Tone.Player({ url: WOOD_URL,      volume: -10 }).toDestination();
  shaker1P  = new Tone.Player({ url: SHAKER1_URL,   volume: -18 }).toDestination();
  shaker2P  = new Tone.Player({ url: SHAKER2_URL,   volume: -18 }).toDestination();

  // 16 ACID vocal players — load all once, the txid picks which one fires at the drop.
  vocalsP = VOCAL_URLS.map(url => new Tone.Player({ url, volume: -2 }).toDestination());

  // 303 chain — TWO parallel filter/drive paths on the same MonoSynth, summed:
  //
  //   MonoSynth ─┬─[ filterAuto → distAuto → makeupAuto ]─┐
  //              │                                         ├─→ delay → reverb → limiter → out
  //              └─[ filterUser → distUser → makeupUser ]─┘
  //
  // Each path has its own makeup gain (-6 dB) so when the two paths sum, the
  // perceived loudness stays at unity. Limiter at the end is a brick-wall safety.
  filterAuto = new Tone.Filter({ frequency: 400, type: "lowpass", Q: 3 });
  distAuto   = new Tone.Distortion(0.15);
  makeupAuto = new Tone.Gain(0.5);

  filterUser = new Tone.Filter({ frequency: userCutoff, type: "lowpass", Q: userReso });
  distUser   = new Tone.Distortion(userDrive);
  makeupUser = new Tone.Gain(0.5);

  delayFX       = new Tone.FeedbackDelay({ delayTime: "8n", feedback: 0.5, wet: 0 });
  reverbFX      = new Tone.Reverb({ decay: 3, wet: 0 });
  masterLimiter = new Tone.Limiter(-1);
  // FFT analyser tap so visualizers can read the live spectrum off the master bus
  masterAnalyser = new Tone.Analyser("fft", 64);
  masterLimiter.connect(masterAnalyser);
  await reverbFX.generate();

  synth = new Tone.MonoSynth({
    oscillator: { type: "sawtooth" },
    envelope:       { attack: 0.005, decay: 0.2, sustain: 0.1, release: 0.2 },
    filterEnvelope: { attack: 0.005, decay: 0.3, sustain: 0.2, release: 0.3, baseFrequency: 200, octaves: 3 },
    portamento: 0,  // glide time — set per-note for 303-style slides
  });
  synth.volume.value = -10;

  // Wire both parallel chains: synth fans out to both filters, both feed into
  // the shared delay → reverb → limiter master bus.
  synth.fan(filterAuto, filterUser);
  filterAuto.chain(distAuto, makeupAuto, delayFX);
  filterUser.chain(distUser, makeupUser, delayFX);
  delayFX.chain(reverbFX, masterLimiter, Tone.Destination);

  // Apply any knob values the user set before pressing play
  applyFXFromKnobs();

  await Tone.loaded();

  // Schedule a 16th-note step on Tone.Transport. Tone uses the Web Audio clock
  // which is sample-accurate and immune to setInterval/setTimeout throttling
  // (the iOS Safari bug that was making the music slower / drifting on phones).
  // The callback receives `time` = the precise audio-context time at which the
  // event fires. ALL audio events use that time so the timing stays locked.
  // Visuals are wrapped in Tone.Draw.schedule so they fire on the same beat.
  stepIdx = 0;
  Tone.Transport.position = 0;
  scheduleId = Tone.Transport.scheduleRepeat((time) => {
    const stepIn16 = stepIdx % 16;
    const barCount = Math.floor(stepIdx / 16) % 8;
    const localStep = stepIdx;  // capture for the visual closure

    // ---- VISUALS — set frameIdx directly; requestAnimationFrame picks it up ----
    // 3-frame sprite dance: frame 2 = clap pose, frame 1 = hat nod, frame 0 = rest.
    // Each pose held for 2 steps (~245ms at 123 BPM) so it's visible.
    // Gated on whether the sound actually plays — drums stop → dance stops.
    // (Setting frameIdx directly here is fine; the RAF render loop reads it
    // every frame anyway. We don't need Tone.Draw.schedule for sub-frame
    // visual sync — and avoiding it sidesteps an iOS Safari edge case.)
    const clapFires = (barCount === 7 && stepIn16 >= 12) ||
                      (stepIn16 === 4 || stepIn16 === 12);
    const hatFires  = currentKit.hat && stepIn16 % 4 === 2 &&
                      !(barCount === 7 && stepIn16 >= 12);
    if (clapFires) stepsSinceClap = 0; else stepsSinceClap++;
    if (hatFires)  stepsSinceHat  = 0; else stepsSinceHat++;
    if      (stepsSinceClap < 2) frameIdx = 2;
    else if (stepsSinceHat  < 2) frameIdx = 1;
    else                         frameIdx = 0;
    // Step display highlight — also fine on the JS thread.
    if (stepsEl) {
      const stepEls = stepsEl.querySelectorAll(".step");
      for (let i = 0; i < stepEls.length; i++) {
        stepEls[i].classList.toggle("active", i === stepIn16);
      }
    }

    // ---- KICK ----
    if (currentKit.kick === "halftime") {
      if (barCount < 7 && (stepIn16 === 0 || stepIn16 === 8)) {
        kickP.start(time);
        if (stepIn16 === 0) kickFlash = 1;
      }
    } else {
      const isFirstHalf = barCount < 4;
      if (isFirstHalf) {
        if (stepIn16 % 4 === 0) { kickP.start(time); kickFlash = 1; }
      } else {
        if (barCount === 4 && stepIn16 === 0) { kickP.start(time); kickFlash = 1; }
      }
      if (barCount === 0 && stepIn16 === 2) kickP.start(time);
    }

    // ---- CLAP ----
    if (barCount === 7 && stepIn16 >= 12) {
      clapP.start(time); clapFlash = 1;
    } else if (stepIn16 === 4 || stepIn16 === 12) {
      clapP.start(time); clapFlash = 1;
    }

    // ---- HAT ----
    if (currentKit.hat && stepIn16 % 4 === 2 && !(barCount === 7 && stepIn16 >= 12)) {
      if (currentKit.hat === "dif") hatDifP.start(time);
      else hatP.start(time);
      hatFlash = 1;
    }

    // ---- FINAL HIT ----
    if (barCount === 7 && stepIn16 === 12) { finalP.start(time); acidFlash = 1; }

    // ---- ACID VOCAL DROP ----
    if (barCount === 7 && stepIn16 === 12 && current && vocalsP[current.vocalIdx]) {
      try { vocalsP[current.vocalIdx].start(time); } catch (e) {}
    }

    // ---- OPTIONAL PERCUSSION LAYERS ----
    const layers = currentKit.layers || [];
    if (layers.includes("SNARE_DIF") && (stepIn16 === 4 || stepIn16 === 12) && !(barCount === 7 && stepIn16 >= 12)) {
      snareDifP.start(time);
    }
    if (layers.includes("SHAKER1") && !(barCount === 7 && stepIn16 >= 9)) shaker1P.start(time);
    if (layers.includes("SHAKER2") && !(barCount === 7 && stepIn16 >= 9)) shaker2P.start(time);
    if (layers.includes("TAMB") && stepIn16 % 4 === 2 && !(barCount === 7 && stepIn16 >= 12)) {
      tambP.start(time);
    }
    if (layers.includes("WOOD") && stepIn16 === 0 && (barCount === 0 || barCount === 4)) {
      woodP.start(time);
    }

    // ---- BASS (303) ----
    // 16-bar loop = two 8-bar riffs. Riff A (bars 1-8) uses `bassline`,
    // Riff B (bars 9-16) uses `bassline2` (the V2 variation). Drums and
    // arrangement (kick build, drop, tension, outro) stay locked to the
    // 8-bar shape — only the bassline notes swap.
    //
    // Bar swap: bars 3↔11 and 7↔15 are crossed so the 16-bar groove has
    // more variation. Default would be A A A A A A A A B B B B B B B B;
    // after swap it's    A A B A A A B A B B A B B B A B.
    const bassAllowed = !(barCount === 7 && stepIn16 >= 9);
    const globalBarIdx = Math.floor(stepIdx / 16) % 16;
    let useRiffB = globalBarIdx >= 8;
    // 1-bar alternating swap: every other bar flips between A and B.
    //  First 8 bars : A B A B A B A B
    //  Second 8 bars: B A B A B A B A  (mirror across the 8-bar midpoint)
    // useRiffB is XOR of "is odd bar" with "is second half".
    const _isOddBar = (globalBarIdx % 2) === 1;
    const _isSecondHalf = globalBarIdx >= 8;
    useRiffB = _isOddBar !== _isSecondHalf;
    const activeBass  = useRiffB ? (current.bassline2 || current.bassline) : current.bassline;
    const pattern = patternForBarDeep(activeBass, barCount, current.nonceHex);
    const step = pattern[stepIn16];

    // ============ AUTO CHAIN — baked-in 303 squelch arrangement ============
    cutoffLfoPhase += CUTOFF_LFO_SPEEDS[barCount];
    resoLfoPhase   += RESO_LFO_SPEEDS[barCount];

    const cutoffArc  = lerpArc(CUTOFF_ARC, barCount, stepIn16);
    const cutoffLfo  = Math.sin(cutoffLfoPhase) * 350;
    const cutoffAuto = Math.max(150, Math.min(6500, cutoffArc + cutoffLfo));
    filterAuto.frequency.setValueAtTime(cutoffAuto, time);

    const resoArc  = lerpArc(RESO_ARC, barCount, stepIn16);
    const resoLfo  = Math.sin(resoLfoPhase) * 1.8;
    const resoAuto = Math.max(0.5, Math.min(22, resoArc + resoLfo));
    filterAuto.Q.setValueAtTime(resoAuto, time);

    let driveAuto;
    if (barCount < 7) {
      const buildProgress = (barCount * 16 + stepIn16) / (7 * 16);
      driveAuto = 0.10 + buildProgress * 0.40;                      // build
    } else if (stepIn16 < 9) {
      driveAuto = 0.50 - (stepIn16 / 9) * 0.18;                     // lull
    } else {
      driveAuto = 0.32 + ((stepIn16 - 9) / 6) * 0.33;               // harder drop
    }
    driveAuto += Math.sin(localStep * 0.12) * 0.04;
    setAutoDrive(driveAuto, time);

    if (bassAllowed && step.note) {
      const velocity = step.play ? 0.85 : 0.45;
      const isSlide = step.play && current.slideMask && current.slideMask[stepIn16];
      synth.portamento = isSlide ? 0.06 : 0;
      synth.triggerAttackRelease(step.note, "16n", time, velocity);
    }

    stepIdx++;
  }, "16n");

  // Kick the Transport. Position was zeroed above so we start clean.
  Tone.Transport.start();
}

function stopAudio() {
  // Cancel the Transport-scheduled step callback and stop the Transport.
  if (scheduleId !== null) {
    try { Tone.Transport.clear(scheduleId); } catch (e) {}
    scheduleId = null;
  }
  try { Tone.Transport.stop(); Tone.Transport.position = 0; } catch (e) {}
  // Legacy interval guard (in case anything still holds a stepTimer).
  if (stepTimer) { clearInterval(stepTimer); stepTimer = null; }
  audioStarted = false;
  frameIdx = 0;
  stepsSinceHat  = 999;
  stepsSinceClap = 999;
  // Reset LFO phases so each play starts from zero
  cutoffLfoPhase = 0;
  resoLfoPhase   = 0;
  playBtn.textContent = "▶ PLAY ACID";
}

playBtn.addEventListener("click", () => audioStarted ? stopAudio() : startAudio());
mainCanvas.addEventListener("click", () => audioStarted ? stopAudio() : startAudio());
nextBtn.addEventListener("click", async () => {
  if (audioStarted) stopAudio();
  const h = EPOCH_START + Math.floor(Math.random() * (EPOCH_END - EPOCH_START + 1));
  await setFeatured(h);
});

// -------------------------- gallery --------------------------
async function renderGallery() {
  const grid = document.getElementById("gallery");
  const picks = [];
  while (picks.length < 8) {
    const h = EPOCH_START + Math.floor(Math.random() * (EPOCH_END - EPOCH_START + 1));
    if (!picks.includes(h)) picks.push(h);
  }
  for (const height of picks) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="frog-box" style="width:100%;aspect-ratio:1/1;height:auto;position:relative">
        <img class="bg-layer" src="" style="position:absolute;top:0;left:0;width:100%;height:100%">
        <canvas class="frog-canvas" width="500" height="500" style="position:absolute;top:0;left:0;width:100%;height:100%;background:transparent;z-index:2"></canvas>
      </div>
      <div class="meta">loading #${height}…</div>
    `;
    grid.appendChild(card);

    const block = await fetchBlock(height);
    const merkle = (block.merkle_root || block.merkleroot || "").replace(/^0x/,"");
    const traits = pickTraits(merkle);
    const sprites = await loadFrogSprites(traits);
    card.querySelector(".bg-layer").src = bgPath(traits.bg.slot);
    drawFrame(card.querySelector("canvas").getContext("2d"), sprites, traits, 0);
    card.querySelector(".meta").innerHTML = `<b>#${height}</b> · <span class="tier-${traits.color.tier.toUpperCase()}">${traits.color.name}</span> · head ${traits.head.slot} · eyes ${traits.eyes.slot}`;

    card.addEventListener("click", async () => {
      if (audioStarted) stopAudio();
      await setFeatured(height);
      document.querySelector("#mainFrog").scrollIntoView({ behavior: "smooth", block: "center" });
    });
  }
}

// -------------------------- init --------------------------
(async () => {
  buildVisualizerPicker();
  await setFeatured(942000);
  animate();
})();
